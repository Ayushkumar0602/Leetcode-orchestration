  <!-- SPA Canonical Injection: Set before React loads to prevent false Google duplicates -->

    (function () {
      var link = document.createElement('link');
      link.rel = 'canonical';
      var url = new URL(window.location.href);
      // Ensure absolute consistency (e.g. drop query params if needed, or keep path)
      var cleanUrl = url.origin + url.pathname;
      // Strip trailing slash if not root
      if (cleanUrl.length > url.origin.length + 1 && cleanUrl.endsWith('/')) {
        cleanUrl = cleanUrl.slice(0, -1);
      }
      link.href = cleanUrl;
      document.head.appendChild(link);
    })();
  </script>
