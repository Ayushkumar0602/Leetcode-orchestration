services:
  # ─── Backend (Express API) ───────────────────────────────────────────────────
  - type: web
    name: ai-interview-backend
    runtime: node
    rootDir: backend

    # Install Node deps AND all language runtimes needed for code execution
    buildCommand: |
      npm install
      apt-get update -qq
      apt-get install -y --no-install-recommends \
        gcc \
        g++ \
        default-jdk \
        golang-go \
        rustc

    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GEMINI_API_KEY_5
        sync: false
      - key: GEMINI_API_KEY_6
        sync: false
      - key: GEMINI_API_KEY_7
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: SARVAM_API_KEY
        sync: false
