services:
  # ─── Backend (Express API) ───────────────────────────────────────────────────
  - type: web
    name: ai-interview-backend
    runtime: node
    rootDir: backend

    # Install Node deps, language runtimes, and Python ML dependencies
    buildCommand: |
      npm install
      apt-get update -qq
      apt-get install -y --no-install-recommends \
        gcc \
        g++ \
        default-jdk \
        golang-go \
        rustc \
        python3 \
        python3-pip
      pip3 install -r ml/requirements.txt --quiet

    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_4
        sync: false
      - key: GEMINI_API_KEY_5
        sync: false
      - key: GEMINI_API_KEY_6
        sync: false
      - key: GEMINI_API_KEY_7
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
      - key: FIREBASE_AUTH_DOMAIN
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        sync: false
      - key: FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: FIREBASE_APP_ID
        sync: false
      - key: FIREBASE_MEASUREMENT_ID
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: ML_PORT
        value: "5001"
      - key: ML_SERVICE_URL
        value: http://localhost:5001
