name: Keep-Alive Ping

on:
  schedule:
    - cron: '*/12 * * * *'  # Runs every 12 minutes
  workflow_dispatch:        # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          echo "Pinging leetcode-orchestration..."
          curl -s https://leetcode-orchestration.onrender.com/api/ping > /dev/null
          echo "Ping sent!"
